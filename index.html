<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário Financeiro — Elétrica | Engehall</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --azul:#004F92;--azul-claro:#0079D2;--azul-medio:#346691;
  --laranja:#E05C16;--laranja-vivo:#FA9E00;
  --branco:#ffffff;--cinza-bg:#f4f5f7;--cinza-borda:#dde1e7;
  --cinza-text:#4a5568;--cinza-muted:#8a94a6;--text-dark:#1a202c;
}
body{font-family:'Poppins',sans-serif;background:var(--cinza-bg);color:var(--text-dark);min-height:100vh;font-size:14px}
header{background:var(--azul);position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(0,79,146,.35)}
.header-inner{max-width:1280px;margin:0 auto;padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between}
.header-brand{display:flex;align-items:center;gap:14px}
.brand-name{font-size:17px;font-weight:700;color:#fff;letter-spacing:.01em}
.brand-sub{font-size:11px;color:rgba(255,255,255,.6);font-weight:400;letter-spacing:.04em;text-transform:uppercase}
.btn-hdr{display:flex;align-items:center;gap:6px;font-family:'Poppins',sans-serif;font-size:12px;font-weight:500;color:rgba(255,255,255,.85);background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:7px 14px;cursor:pointer;transition:.15s}
.btn-hdr:hover{background:rgba(255,255,255,.22);color:#fff}
.accent-bar{height:3px;background:linear-gradient(90deg,var(--laranja),var(--laranja-vivo))}
main{max-width:1280px;margin:0 auto;padding:2rem 2rem 4rem}
.controls{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:12px}
.nav-group{display:flex;align-items:center;gap:10px}
.nav-btn{width:38px;height:38px;background:#fff;border:1.5px solid var(--cinza-borda);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--azul);transition:.15s}
.nav-btn:hover{border-color:var(--azul);box-shadow:0 0 0 3px rgba(0,79,146,.1)}
.nav-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.month-label{font-size:20px;font-weight:700;color:var(--azul);min-width:210px;text-align:center}
.today-btn{font-family:'Poppins',sans-serif;font-size:11px;font-weight:700;background:#fff;border:1.5px solid var(--cinza-borda);border-radius:8px;padding:8px 18px;cursor:pointer;color:var(--azul);letter-spacing:.06em;text-transform:uppercase;transition:.15s}
.today-btn:hover{border-color:var(--azul);background:rgba(0,79,146,.05)}
.filters-row{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:1.25rem}
.filters-label{font-size:10px;font-weight:700;color:var(--cinza-muted);text-transform:uppercase;letter-spacing:.07em;margin-right:4px}
.filter-chip{display:flex;align-items:center;gap:6px;font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;padding:5px 13px;border-radius:20px;border:1.5px solid transparent;cursor:pointer;transition:.15s;letter-spacing:.02em}
.filter-chip .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.filter-chip.off{opacity:.3;filter:grayscale(.8)}
.legend{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:1.75rem;padding:12px 18px;background:#fff;border:1px solid var(--cinza-borda);border-radius:10px;border-left:4px solid var(--azul)}
.leg-item{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--cinza-text)}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.leg-item strong{color:var(--text-dark);font-weight:600}
.week-header{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px}
.week-header div{font-size:11px;font-weight:700;color:var(--azul);text-align:center;text-transform:uppercase;letter-spacing:.06em;padding:6px 0}
.week-header div:first-child,.week-header div:last-child{color:var(--cinza-muted)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cell{background:#fff;border:1px solid var(--cinza-borda);border-radius:8px;padding:8px;min-height:100px;cursor:pointer;transition:border-color .15s,box-shadow .15s,transform .1s;position:relative;overflow:hidden}
.cell::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:transparent;border-radius:8px 8px 0 0}
.cell.has-tasks::before{background:var(--azul-claro)}
.cell:hover:not(.ghost):not(.weekend-cell){border-color:var(--azul);box-shadow:0 4px 16px rgba(0,79,146,.12);transform:translateY(-1px)}
.cell.ghost{background:transparent;border-color:transparent;cursor:default;pointer-events:none}
.cell.weekend-cell{background:#f9fafb;cursor:default}
.cell.weekend-cell::before{display:none}
.cell.today-cell{border-color:var(--laranja);border-width:2px;box-shadow:0 0 0 3px rgba(224,92,22,.12)}
.cell.today-cell::before{background:var(--laranja)}
.day-num{font-size:13px;font-weight:600;color:var(--cinza-muted);margin-bottom:5px;display:flex;align-items:center;gap:6px}
.day-num.is-today{color:var(--laranja)}
.today-badge{font-size:9px;font-weight:700;background:var(--laranja);color:#fff;border-radius:10px;padding:1px 7px;letter-spacing:.04em;text-transform:uppercase}
.pills{display:flex;flex-direction:column;gap:3px}
.pill{font-size:10px;font-weight:500;padding:3px 7px;border-radius:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.more-lbl{font-size:10px;font-weight:600;color:var(--azul);margin-top:2px;padding-left:2px}
.empty-lbl{font-size:10px;color:var(--cinza-muted);margin-top:4px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(10,20,40,.55);z-index:100;align-items:center;justify-content:center;padding:24px 16px;backdrop-filter:blur(3px)}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:14px;width:100%;max-width:560px;max-height:87vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:popIn .2s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{opacity:0;transform:scale(.94) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{background:var(--azul);padding:1.25rem 1.5rem 1rem;border-radius:14px 14px 0 0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;position:sticky;top:0}
.modal-date{font-size:15px;font-weight:700;color:#fff;text-transform:capitalize}
.modal-date-sub{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px}
.modal-close{width:30px;height:30px;flex-shrink:0;background:rgba(255,255,255,.15);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.8);font-size:18px;font-family:'Poppins',sans-serif;transition:.15s}
.modal-close:hover{background:rgba(255,255,255,.28);color:#fff}
.modal-orange-bar{height:3px;background:linear-gradient(90deg,var(--laranja),var(--laranja-vivo))}
.modal-body{padding:1.25rem 1.5rem 1.5rem;display:flex;flex-direction:column;gap:10px}
.task-card{border:1px solid var(--cinza-borda);border-radius:10px;overflow:hidden;transition:box-shadow .15s}
.task-card:hover{box-shadow:0 2px 10px rgba(0,79,146,.1)}
.task-card-header{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;background:#fafbfd;transition:background .15s}
.task-card-header:hover{background:#f0f4fa}
.task-left-bar{width:4px;height:36px;border-radius:4px;flex-shrink:0}
.task-title{font-size:13px;font-weight:600;color:var(--text-dark);flex:1;line-height:1.3}
.task-badge{font-size:10px;font-weight:600;padding:2px 9px;border-radius:10px;white-space:nowrap;letter-spacing:.02em}
.task-chevron{color:var(--cinza-muted);transition:transform .2s;flex-shrink:0}
.task-chevron svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;display:block}
.task-card.expanded .task-chevron{transform:rotate(180deg)}
.task-card-body{display:none;padding:0 14px 14px 28px;border-top:1px solid var(--cinza-borda);background:#fff}
.task-card.expanded .task-card-body{display:block}
.task-meta-row{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.meta-chip{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:var(--cinza-text);background:#f0f4fa;border:1px solid #dde6f5;border-radius:20px;padding:4px 11px}
.meta-chip svg{width:12px;height:12px;stroke:var(--azul);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.task-desc{font-size:12px;color:var(--cinza-text);line-height:1.75}
@media print{.btn-hdr,.controls,.filters-row{display:none}.modal-bg{display:none!important}header{position:static;box-shadow:none}.accent-bar{display:none}.cell{break-inside:avoid;min-height:80px}}
@media(max-width:700px){main{padding:1rem 1rem 3rem}.header-inner{padding:0 1rem}.month-label{font-size:15px;min-width:150px}.cell{min-height:70px;padding:5px}.day-num{font-size:11px}.pill{font-size:9px}.week-header div{font-size:9px}}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="header-brand">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="20,3 36,12 36,28 20,37 4,28 4,12" fill="#0079D2" opacity=".85"/>
        <polygon points="20,3 36,12 36,28 20,37 4,28 4,12" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="1.2"/>
        <rect x="13" y="14" width="8" height="8" fill="white" opacity=".92"/>
        <rect x="19" y="19" width="8" height="8" fill="#E05C16"/>
      </svg>
      <div>
        <div class="brand-name">EngeHall</div>
        <div class="brand-sub">Calendário Financeiro · Elétrica</div>
      </div>
    </div>
    <button class="btn-hdr" onclick="window.print()">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5V2h8v3M4 11H2V6h12v5h-2M4 9h8v5H4z"/></svg>
      Imprimir
    </button>
  </div>
</header>
<div class="accent-bar"></div>
<main>
  <div class="controls">
    <div class="nav-group">
      <button class="nav-btn" aria-label="Mês anterior" onclick="changeMonth(-1)"><svg viewBox="0 0 16 16"><polyline points="10 12 6 8 10 4"/></svg></button>
      <div class="month-label" id="month-label"></div>
      <button class="nav-btn" aria-label="Próximo mês" onclick="changeMonth(1)"><svg viewBox="0 0 16 16"><polyline points="6 4 10 8 6 12"/></svg></button>
    </div>
    <button class="today-btn" onclick="goToday()">Hoje</button>
  </div>
  <div class="filters-row">
    <span class="filters-label">Filtrar</span>
    <div id="filters" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
  </div>
  <div class="legend" id="legend"></div>
  <div class="week-header">
    <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
  </div>
  <div class="cal-grid" id="grid"></div>
</main>
<div class="modal-bg" id="modal-bg" onclick="bgClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div><div class="modal-date" id="m-date"></div><div class="modal-date-sub" id="m-sub"></div></div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-orange-bar"></div>
    <div class="modal-body" id="m-body"></div>
  </div>
</div>
<script>
const CATS={
  diario:   {label:'Diário',         bg:'#dbeafe',text:'#1e3a8a',dot:'#004F92',bar:'#004F92'},
  semanal:  {label:'Semanal',        bg:'#dcfce7',text:'#14532d',dot:'#16a34a',bar:'#16a34a'},
  quinzenal:{label:'Quinzenal',      bg:'#fef9c3',text:'#713f12',dot:'#ca8a04',bar:'#ca8a04'},
  mensal:   {label:'Mensal',         bg:'#ede9fe',text:'#3b0764',dot:'#7c3aed',bar:'#7c3aed'},
  pontual:  {label:'Pontual / Data', bg:'#ffe4e6',text:'#881337',dot:'#E05C16',bar:'#E05C16'},
};
const TASKS=[
  {id:1,title:'Conciliação bancária — entradas',cat:'diario',resp:'Alvaro',freq:'Todos os dias úteis',desc:'Acessar Conta Azul e verificar se há lançamentos de entradas em aberto. Conferir no Pagar.me eventuais pendências do dia.',rule:d=>isUtil(d)},
  {id:2,title:'Conciliação bancária — saídas',cat:'diario',resp:'Eulália',freq:'Todos os dias úteis',desc:'Verificar e registrar saídas no Conta Azul diariamente. Garantir que todos os pagamentos realizados estejam lançados corretamente.',rule:d=>isUtil(d)},
  {id:3,title:'Atualização fluxo de caixa Pagar.me',cat:'diario',resp:'Alvaro',freq:'Todos os dias úteis',desc:'Acessar Pagar.me > Extratos, selecionar período do dia anterior. Verificar valor de vendas, taxas, chargebacks e estornos. Copiar para a planilha de fluxo de caixa e conferir se o saldo bate. Se não bater, encontrar a divergência antes de finalizar.',rule:d=>isUtil(d)},
  {id:4,title:'Recebimento de notas/boletos e cadastro',cat:'diario',resp:'Eulália',freq:'Todos os dias úteis',desc:'Acessar e-mail financeiro1@engehall.com, filtrar boletos, faturas e notas fiscais. Cadastrar todos no Conta Azul com anexo. Provisionar os que têm recorrência conhecida.',rule:d=>isUtil(d)},
  {id:5,title:'Monitorar transações e limites de cartões',cat:'diario',resp:'Marcela',freq:'Todos os dias úteis',desc:'Monitorar via e-mail (financeiro2@engehall.com.br) se alguma transação foi recusada. Verificar Banco Itaú e Conta Simples. Se cartão vencido: gerar novo. Se limite estourado: verificar origem com responsável e avaliar aumento de limite.',rule:d=>isUtil(d)},
  {id:6,title:'Saque Pagar.me',cat:'semanal',resp:'Alvaro',freq:'Toda segunda-feira',desc:'Acessar Pagar.me e conferir saldo disponível. Realizar saque SOMENTE se saldo estiver acima de R$ 10.000 — abaixo disso, aguardar a próxima semana para manter reserva contra chargebacks. Conciliação no Conta Azul feita na terça-feira seguinte.',rule:d=>isUtil(d)&&d.getDay()===1},
  {id:7,title:'Acompanhamento inadimplentes TMB',cat:'semanal',resp:'Alvaro',freq:'Toda segunda-feira',desc:'Acessar TMB > Financeiro > Contratos > Contas a Receber > filtrar status "vencidos". Exportar lista, comparar com a semana anterior identificando entradas e saídas. Repassar lista atualizada para Elisa (comercial) via WhatsApp.',rule:d=>isUtil(d)&&d.getDay()===1},
  {id:8,title:'Agendamento e pagamento de fornecedores',cat:'semanal',resp:'Marcela',freq:'Segundas e quintas-feiras',desc:'Acessar Banco Itaú (celular corporativo ou computador). Fazer leitura do código de barras, agendar data de pagamento e anexar NF ou anotar nome/vencimento do boleto. Gerar relatório "contas a autorizar" no Conta Azul (Contas a Pagar > Consulta > filtrar por data), salvar em PDF e enviar para Eulália. Eulália confere com Luís via WhatsApp, que dá a aprovação final.',rule:d=>isUtil(d)&&(d.getDay()===1||d.getDay()===4)},
  {id:9,title:'Atualização fluxo de caixa TMB',cat:'semanal',resp:'Alvaro',freq:'Quarta-feira (a cada 2–3 dias)',desc:'Acessar TMB > Finanças e Contratos > Carteira. Verificar novas vendas e parcelas pagas desde a última atualização. Para nova venda: cadastrar no Conta Azul. Para pagamento de parcela existente: dar baixa. Lançar também as duas taxas de serviço obrigatórias do TMB por compra.',rule:d=>isUtil(d)&&d.getDay()===3},
  {id:10,title:'Conferência de duplicidades de pagamentos',cat:'quinzenal',resp:'Alvaro',freq:'Dias 1 e 15 de cada mês',desc:'Acessar dashboard do Bernardo e verificar se há pagamentos duplicados. Se houver duplicidade, preencher formulário de duplicidade para que o comercial faça a tratativa com o cliente.',rule:d=>isUtil(d)&&(d.getDate()===1||d.getDate()===15)},
  {id:11,title:'Saque TMB — mensal',cat:'mensal',resp:'Alvaro',freq:'Primeira segunda-feira do mês',desc:'Na primeira segunda-feira de cada mês: acessar TMB e conferir saldo disponível. Realizar saque SOMENTE se saldo estiver acima de R$ 5.000. Abaixo disso, aguardar a semana seguinte.',rule:d=>isUtil(d)&&d.getDay()===1&&d.getDate()<=7},
  {id:12,title:'Fechamento de faturas dos cartões',cat:'mensal',resp:'Marcela',freq:'Entre os dias 1 e 5',desc:'Verificar transações recebidas no e-mail financeiro2, subir lançamentos no Conta Azul. Fechar faturas dos cartões corporativos do Conta Simples. Confirmar que todas as despesas do mês anterior estão registradas.',rule:d=>isUtil(d)&&d.getDate()===3},
  {id:13,title:'Fechamento da apresentação mensal',cat:'mensal',resp:'Marcela + Alvaro + Eulália',freq:'Primeira segunda-feira do mês',desc:'Alvaro confronta valores do dashboard com Pagar.me — se não bater, acionar Bernardo via ClickUp. Preencher planilha com receitas categorizadas. Alimentar apresentação em PowerPoint com dados do mês anterior. Bruna preenche dados de eventos (meteóricos, lançamentos). Compartilhar análise no grupo dos sócios.',rule:d=>isUtil(d)&&d.getDay()===1&&d.getDate()<=7},
  {id:14,title:'Envio de NFs para a contabilidade',cat:'mensal',resp:'Eulália',freq:'Até o dia 4 (ou último dia útil antes)',desc:'ATENÇÃO: prazo máximo é o dia 4 de cada mês. Se o dia 4 cair em sábado ou domingo, antecipar para a sexta-feira anterior (último dia útil). O envio dentro do prazo é essencial para que a contabilidade gere as guias a tempo — o ISS vence no dia 8. Conferir NFs de entrada de produto no Conta Azul. Buscar NFs de serviço tomado no Portal Nacional (nfse.gov.br). Gerar relatório de notas de receita no Notazz. Alimentar Drive compartilhado e formalizar envio por e-mail para contabilidade Grecco.',rule:d=>{const y=d.getFullYear(),m=d.getMonth(),dia4=new Date(y,m,4),dow4=dia4.getDay();const alvo=dow4===6?3:dow4===0?3:4;return isUtil(d)&&d.getDate()===alvo}},
  {id:15,title:'Verificar domínios e certificados digitais',cat:'mensal',resp:'Marcela',freq:'Início do mês (~dia 8)',desc:'Verificar no Conta Azul e na planilha de ferramentas (compartilhada com Bernardo) se algum domínio ou certificado digital está próximo de vencer. Para renovação de certificado digital, acionar diretores para liberar acesso (vinculado ao celular/e-mail deles).',rule:d=>isUtil(d)&&d.getDate()===8},
  {id:16,title:'Pagamento do ISS próprio',cat:'pontual',resp:'Eulália',freq:'Vence dia 8',desc:'Receber guia da contabilidade (gerada após envio das NFs no dia 4). Efetuar pagamento via Banco Itaú até o dia 8. Atenção: envio tardio das NFs resulta em ISS pago com encargo de atraso. Após efetuar o pagamento, registrar obrigatoriamente em Contas a Pagar no Conta Azul.',rule:d=>isUtil(d)&&d.getDate()===8},
  {id:17,title:'Atualização planilha de ferramentas',cat:'mensal',resp:'Marcela + Bernardo',freq:'Reunião mensal (~dia 10)',desc:'Reunião mensal com Bernardo para revisar planilha de ferramentas e atualizar valores. Verificar variações de custo. Se alguma ferramenta estiver com custo elevado, acionar setor responsável para avaliar alternativas. Informações consolidadas no dashboard do Bernardo.',rule:d=>isUtil(d)&&d.getDate()===10},
  {id:18,title:'Preenchimento e conferência da DR',cat:'mensal',resp:'Marcela + Eulália',freq:'A partir do dia 10',desc:'Aguardar fechamento da fatura do Banco Itaú. Acessar Conta Azul (despesas), Dashboard do Bernardo (tráfego) e relatório mensal de fechamento (receita). Preencher planilha da DR. Avaliar oscilações de despesas, margens, lucro líquido e categorias discrepantes.',rule:d=>isUtil(d)&&d.getDate()===10},
  {id:19,title:'Conferência mensal do fluxo de caixa',cat:'mensal',resp:'Eulália',freq:'Até o dia 10',desc:'Acessar Conta Azul > Fluxo de Caixa. Verificar se o saldo do sistema bate com os saldos bancários reais (Banco Itaú, Pagar.me, Conta Simples). Identificar e corrigir divergências antes de fechar o mês.',rule:d=>isUtil(d)&&d.getDate()===10},
  {id:20,title:'Pagamento IR retido',cat:'pontual',resp:'Eulália',freq:'Guia recebida até dia 20 — pagar no mesmo dia',desc:'Receber guia de IR retido da contabilidade (enviada mensalmente até o dia 20). Efetuar pagamento via Banco Itaú no mesmo dia do recebimento. Após efetuar o pagamento, registrar obrigatoriamente em Contas a Pagar no Conta Azul.',rule:d=>isUtil(d)&&d.getDate()===20},
  {id:21,title:'Pagamento PIS, Cofins, ICMS e ISS retido',cat:'pontual',resp:'Eulália',freq:'Prazo até dia 25',desc:'Receber guias da contabilidade para PIS, Cofins, ICMS e ISS retido. Efetuar todos os pagamentos via Banco Itaú até o dia 25. Após cada pagamento, registrar obrigatoriamente em Contas a Pagar no Conta Azul com comprovante anexado.',rule:d=>isUtil(d)&&d.getDate()===25},
  {id:24,title:'Pagamento IRPJ e CSLL (trimestral)',cat:'pontual',resp:'Eulália',freq:'Trimestral — até dia 30 do mês seguinte ao fim do trimestre',desc:'Pagamento trimestral de IRPJ e CSLL (lucro presumido). A guia é recebida da contabilidade até o dia 30 do mês posterior ao encerramento do trimestre (abril, julho, outubro e janeiro). Efetuar pagamento via Banco Itaú assim que receber a guia. Após o pagamento, registrar obrigatoriamente em Contas a Pagar no Conta Azul com comprovante anexado.',rule:d=>{const m=d.getMonth(),day=d.getDate();const trimMeses=[3,6,9,0];return isUtil(d)&&trimMeses.includes(m)&&day===30}},
  {id:22,title:'Conferência NFs — notas x vendas',cat:'mensal',resp:'Alvaro',freq:'Final do mês',desc:'Acessar Notazz e Pagar.me. Confrontar valores das notas fiscais emitidas com os valores das vendas registradas. Se o Notazz não tiver cancelado automaticamente alguma nota, verificar no Pagar.me e cancelar manualmente — abrir chamado com equipe do sistema.',rule:d=>isUtil(d)&&d.getDate()===28},
  {id:23,title:'Conciliação bancária mensal — Conta Simples',cat:'mensal',resp:'Marcela / Eulália',freq:'Final do mês',desc:'Conta Simples é conciliada apenas uma vez ao mês (tem somente um rendimento mensal). Conferir todos os lançamentos do período e verificar se o saldo está correto.',rule:d=>isUtil(d)&&d.getDate()===28},
];
const TODAY=new Date(2026,5,15);
let cur=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
let activeF=new Set(Object.keys(CATS));
function isUtil(d){return d.getDay()!==0&&d.getDay()!==6}
function getTasksFor(date){return TASKS.filter(t=>activeF.has(t.cat)&&t.rule(date))}
function buildUI(){
  const fl=document.getElementById('filters'),lg=document.getElementById('legend');
  const ex={diario:'conciliação, fluxo de caixa',semanal:'saques, fornecedores',quinzenal:'duplicidades',mensal:'DR, NFs, fechamento',pontual:'impostos com data fixa'};
  for(const[k,v]of Object.entries(CATS)){
    const b=document.createElement('button');
    b.className='filter-chip';b.dataset.cat=k;
    b.innerHTML=`<span class="dot" style="background:${v.dot}"></span>${v.label}`;
    setChip(b,k,true);
    b.onclick=()=>{const on=activeF.has(k);if(on)activeF.delete(k);else activeF.add(k);setChip(b,k,!on);render()};
    fl.appendChild(b);
    lg.innerHTML+=`<span class="leg-item"><span class="leg-dot" style="background:${v.dot}"></span><strong>${v.label}:</strong> <span style="color:var(--cinza-muted)">${ex[k]}</span></span>`;
  }
}
function setChip(b,k,on){
  const v=CATS[k];
  b.style.background=on?v.bg:'transparent';
  b.style.color=on?v.text:'var(--cinza-muted)';
  b.style.borderColor=on?v.dot:'var(--cinza-borda)';
  b.classList.toggle('off',!on);
}
function render(){
  const y=cur.getFullYear(),m=cur.getMonth();
  const MN=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  document.getElementById('month-label').textContent=`${MN[m]} ${y}`;
  const grid=document.getElementById('grid');grid.innerHTML='';
  const fd=new Date(y,m,1).getDay(),ld=new Date(y,m+1,0).getDate();
  for(let i=0;i<fd;i++){const c=document.createElement('div');c.className='cell ghost';grid.appendChild(c)}
  for(let d=1;d<=ld;d++){
    const date=new Date(y,m,d),wknd=!isUtil(date),isToday=date.toDateString()===TODAY.toDateString();
    const cell=document.createElement('div');
    cell.className='cell'+(wknd?' weekend-cell':'')+(isToday?' today-cell':'');
    const dn=document.createElement('div');
    dn.className='day-num'+(isToday?' is-today':'');
    dn.innerHTML=d+(isToday?` <span class="today-badge">hoje</span>`:'');
    cell.appendChild(dn);
    if(!wknd){
      const tasks=getTasksFor(date);
      if(tasks.length>0){
        cell.classList.add('has-tasks');
        const pw=document.createElement('div');pw.className='pills';
        const show=Math.min(tasks.length,3);
        for(let i=0;i<show;i++){
          const t=tasks[i],v=CATS[t.cat];
          const p=document.createElement('div');p.className='pill';
          p.style.background=v.bg;p.style.color=v.text;p.textContent=t.title;pw.appendChild(p);
        }
        if(tasks.length>3){const ml=document.createElement('div');ml.className='more-lbl';ml.textContent=`+${tasks.length-3} tarefa${tasks.length-3>1?'s':''}`;pw.appendChild(ml)}
        cell.appendChild(pw);cell.onclick=()=>openModal(date,tasks);
      }else{const el=document.createElement('div');el.className='empty-lbl';el.textContent='Sem tarefas';cell.appendChild(el);cell.style.cursor='default'}
    }
    grid.appendChild(cell);
  }
  const total=fd+ld,rem=total%7===0?0:7-(total%7);
  for(let i=0;i<rem;i++){const c=document.createElement('div');c.className='cell ghost';grid.appendChild(c)}
}
function openModal(date,tasks){
  const opts={weekday:'long',day:'numeric',month:'long',year:'numeric'};
  document.getElementById('m-date').textContent=date.toLocaleDateString('pt-BR',opts);
  document.getElementById('m-sub').textContent=`${tasks.length} tarefa${tasks.length>1?'s':''} para este dia`;
  const body=document.getElementById('m-body');body.innerHTML='';
  for(const t of tasks){
    const v=CATS[t.cat];
    const card=document.createElement('div');card.className='task-card';
    card.innerHTML=`<div class="task-card-header" onclick="toggleCard(this.closest('.task-card'))">
      <div class="task-left-bar" style="background:${v.bar}"></div>
      <div class="task-title">${t.title}</div>
      <span class="task-badge" style="background:${v.bg};color:${v.text}">${v.label}</span>
      <span class="task-chevron"><svg viewBox="0 0 16 16"><polyline points="4 6 8 10 12 6"/></svg></span>
    </div>
    <div class="task-card-body">
      <div class="task-meta-row">
        <span class="meta-chip"><svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg>${t.freq}</span>
        <span class="meta-chip"><svg viewBox="0 0 16 16"><path d="M8 2a4 4 0 100 8 4 4 0 000-8zM2 14c0-2.2 2.7-4 6-4s6 1.8 6 4"/></svg>${t.resp}</span>
      </div>
      <div class="task-desc">${t.desc}</div>
    </div>`;
    body.appendChild(card);
  }
  document.getElementById('modal-bg').classList.add('open');
  document.body.style.overflow='hidden';
}
function toggleCard(card){card.classList.toggle('expanded')}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');document.body.style.overflow=''}
function bgClick(e){if(e.target===document.getElementById('modal-bg'))closeModal()}
function changeMonth(dir){cur=new Date(cur.getFullYear(),cur.getMonth()+dir,1);render()}
function goToday(){cur=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);render()}
buildUI();render();
</script>
</body>
</html>
